<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Tap N Bite</title>
    <meta
      name="description"
      content="Your request has been submitted successfully. The Tap N Bite team will contact you soon."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                500: '#ff7a14',
                600: '#e56e12',
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-orange-50 via-white to-red-50 text-slate-900 antialiased">
    <main class="mx-auto flex min-h-screen w-full max-w-3xl items-center px-4 py-12 sm:px-6">
      <section class="w-full rounded-2xl border border-orange-100 bg-white/90 p-8 shadow-xl backdrop-blur-sm sm:p-10">
        <a href="/" class="inline-flex items-center">
          <img src="/images/logo.png" alt="Tap N Bite" class="h-12" />
        </a>
        <h1 class="mt-8 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Thank you for reaching out.</h1>
        <p class="mt-4 text-lg leading-relaxed text-slate-700">
          We received your request and sent it to our team at
          <span class="font-semibold text-slate-900">contact@tapnbite.com</span>.
          We will get back to you shortly.
        </p>
        <div class="mt-8 flex flex-wrap gap-3">
          <a
            href="/"
            class="inline-flex items-center rounded-full bg-brand-500 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-brand-500/30 transition-colors hover:bg-brand-600"
          >
            Back to Home
          </a>
          <a
            href="/features"
            class="inline-flex items-center rounded-full border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 transition-colors hover:border-brand-500 hover:text-brand-600"
          >
            Explore Features
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
